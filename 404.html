<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — dataLib</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Syne:wght@800&display=swap');

:root {
  --bg:      #080b0e;
  --surface: #0d1117;
  --border:  #1a2230;
  --accent:  #00ccff;
  --accent2: #ffaa00;
  --red:     #ff4444;
  --text:    #c8d8e8;
  --dim:     #4a5a6a;
  --mono:    'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.05) 2px, rgba(0,0,0,.05) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* grid */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,68,68,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,68,68,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
  pointer-events: none;
}

/* glitch big number */
.err-num {
  font-family: var(--display);
  font-size: clamp(120px, 22vw, 220px);
  font-weight: 800;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,68,68,.25);
  letter-spacing: -.05em;
  line-height: 1;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -58%);
  user-select: none;
  pointer-events: none;
  animation: glitch 4s infinite;
}

@keyframes glitch {
  0%, 94%, 100% { -webkit-text-stroke-color: rgba(255,68,68,.18); transform: translate(-50%, -58%); }
  95% { -webkit-text-stroke-color: rgba(0,204,255,.35); transform: translate(calc(-50% + 3px), -58%); }
  96% { -webkit-text-stroke-color: rgba(255,68,68,.35); transform: translate(calc(-50% - 3px), -58%); }
  97% { transform: translate(-50%, -58%); }
}

.card {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 24px;
  max-width: 520px;
  animation: fadeUp .4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.status-line {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--red);
  border: 1px solid rgba(255,68,68,.25);
  background: rgba(255,68,68,.06);
  padding: 5px 14px;
  border-radius: 2px;
  margin-bottom: 28px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: blink 1.2s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

h1 {
  font-family: var(--display);
  font-size: 38px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.03em;
  margin-bottom: 12px;
}

.subtitle {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.7;
  margin-bottom: 36px;
}

/* terminal block */
.terminal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  text-align: left;
  margin-bottom: 32px;
}

.term-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: #0a0d10;
  border-bottom: 1px solid var(--border);
}

.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #ff5f57; }
.dot.y { background: #febc2e; }
.dot.g { background: #28c840; }

.term-title {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: .08em;
  margin-left: auto;
  margin-right: auto;
}

.term-body {
  padding: 16px 18px;
  font-size: 11px;
  line-height: 2;
}

.term-body .prompt { color: var(--accent); }
.term-body .cmd    { color: var(--text); }
.term-body .out    { color: var(--dim); }
.term-body .err    { color: var(--red); }
.term-body .ok     { color: #00e676; }

.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: var(--accent);
  vertical-align: middle;
  animation: cur .9s step-end infinite;
}
@keyframes cur { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* actions */
.actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 11px 22px;
  border-radius: 3px;
  text-decoration: none;
  transition: all .15s;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  box-shadow: 0 0 20px rgba(0,204,255,.15);
}
.btn-primary:hover {
  background: #00e5ff;
  transform: translateY(-2px);
  text-decoration: none;
  color: #000;
}

.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  border-color: var(--dim);
  color: var(--text);
  transform: translateY(-2px);
  text-decoration: none;
}

/* nav-back top left */
.back-nav {
  position: fixed;
  top: 20px; left: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--dim);
  text-decoration: none;
  transition: color .15s;
  z-index: 100;
}
.back-nav:hover { color: var(--text); text-decoration: none; }

.back-nav svg { width: 12px; height: 12px; }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="err-num" aria-hidden="true">404</div>

<a href="index.html" class="back-nav">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  dataLib
</a>

<div class="card">
  <div class="status-line">
    <span class="status-dot"></span>
    Error 404
  </div>

  <h1>Page not found</h1>
  <p class="subtitle">
    The path you requested doesn't exist in this repository.<br>
    Check the URL or head back to a known location.
  </p>

  <div class="terminal">
    <div class="term-header">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="term-title">datalib — shell</span>
    </div>
    <div class="term-body">
      <div><span class="prompt">$</span> <span class="cmd" id="typed"></span><span class="cursor"></span></div>
      <div class="err" id="errLine" style="opacity:0">→ ERROR: path not found in namespace registry</div>
      <div class="ok"  id="okLine"  style="opacity:0">→ Suggestion: navigate to / or /download</div>
    </div>
  </div>

  <div class="actions">
    <a href="index.html" class="btn btn-primary">
      ← Home
    </a>
    <a href="download.html" class="btn btn-ghost">
      Download
    </a>
    <a href="https://github.com/runtoolkit/dataLib" class="btn btn-ghost" target="_blank" rel="noopener">
      GitHub
    </a>
  </div>
</div>

<script>
// type the bad URL into the terminal
(function() {
  const path = window.location.pathname || '/???';
  const cmd = `navigate ${path}`;
  const el = document.getElementById('typed');
  const err = document.getElementById('errLine');
  const ok  = document.getElementById('okLine');
  let i = 0;
  const iv = setInterval(() => {
    el.textContent = cmd.slice(0, ++i);
    if (i >= cmd.length) {
      clearInterval(iv);
      setTimeout(() => {
        err.style.opacity = '1';
        err.style.transition = 'opacity .3s';
      }, 300);
      setTimeout(() => {
        ok.style.opacity = '1';
        ok.style.transition = 'opacity .3s';
      }, 700);
    }
  }, 38);
})();
</script>
</body>
</html>
